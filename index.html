<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Chấm Công - An Việt Homes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7fa; font-family: 'Segoe UI', sans-serif; }
        .form-container { max-width: 500px; margin: 50px auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-submit { background-color: #001a72; color: white; width: 100%; padding: 12px; font-weight: bold; border-radius: 8px; border: none; }
        .loading-overlay { display: none; text-align: center; color: #001a72; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="form-container">
    <h3 class="text-center mb-4" style="color: #001a72; font-weight: 800;">PHIẾU XÁC NHẬN CHẤM CÔNG</h3>
    <form id="chamCongForm">
        <div class="mb-3">
            <label class="form-label">Họ và tên</label>
            <input type="text" name="hoTen" class="form-control" required placeholder="Ví dụ: Nguyễn Văn A">
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Mã nhân viên</label>
                <input type="text" name="maNV" class="form-control" required placeholder="Ví dụ: AVH123">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Phòng ban</label>
                <input type="text" name="phongBan" class="form-control" required placeholder="Ví dụ: AV1">
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Ngày vắng thực tế</label>
                <input type="date" name="ngay" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Giờ checkin/out phát sinh</label>
                <input type="time" name="gio" class="form-control" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Lý do phát sinh đơn</label>
            <textarea name="lyDo" class="form-control" rows="3" required placeholder="Nhập lý do chi tiết..."></textarea>
        </div>

        <div class="mb-4">
            <label class="form-label font-weight-bold">Ảnh minh chứng đi muộn/vắng mặt</label>
            <input type="file" id="fileUpload" class="form-control" accept="image/*" required>
            <div class="form-text">Hệ thống chấp nhận các file định dạng ảnh chụp màn hình Zalo, Checkin...</div>
        </div>

        <button type="submit" id="btnSubmit" class="btn-submit">GỬI PHIẾU XÁC NHẬN</button>
        <div id="loadingText" class="loading-overlay">⏳ ĐANG XỬ LÝ HÌNH ẢNH & TẢI LÊN DRIVE... VUI LÒNG ĐỢI TRONG GIÂY LÁT!</div>
    </form>
</div>

<script>
    // DÁN LINK API WEB APP CỦA BẠN VÀO ĐÂY
    const scriptURL = 'https://script.google.com/macros/s/AKfycby8-SOtuoN-oq43NXY5743zF6K5KosWao4BJZXy3AbVXLD0ZYSikVxNXwN72_Z52DA/exec'; 
    let fileData = "";
    let fileMimeType = "";

    // Lắng nghe hành vi chọn tệp để đóng gói chuỗi Base64
    document.getElementById('fileUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const result = event.target.result;
                fileMimeType = result.split(';')[0].split(':')[1];
                fileData = result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('chamCongForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnSubmit');
        const loader = document.getElementById('loadingText');
        
        btn.disabled = true;
        loader.style.display = 'block';

        const formData = new FormData(this);
        formData.append('action', 'submitForm');
        
        if(fileData !== "") {
            formData.append('fileData', fileData);
            formData.append('fileMimeType', fileMimeType);
        }

        fetch(scriptURL, { method: 'POST', body: new URLSearchParams(formData) })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    alert("Gửi đơn và lưu trữ ảnh lên Drive thành công!");
                    window.location.reload();
                } else {
                    alert("Có lỗi từ máy chủ: " + data.message);
                    btn.disabled = false;
                    loader.style.display = 'none';
                }
            })
            .catch(err => {
                alert("Lỗi kết nối mạng, vui lòng kiểm tra lại cấu hình API!");
                btn.disabled = false;
                loader.style.display = 'none';
            });
    });
</script>
</body>
</html>
